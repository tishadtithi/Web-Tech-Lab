<!DOCTYPE html>
<html lan="en-US">
    <head>
        <title> Sign up </title>
    </head>
    <body>
        <h1> User Registration Form </h1>
        <form>
            <label for="user"> Name: </label>
            <input type="text" id =name name=name>
            <br> <br>
            <label for="phone">User Phone Number:</label>
            <input type"text" id=phone name=phone>
            <br><br>

            <label for="Gender">Gender:</label>
            <input type="radio" id=Gender name=Male value="Male"> Male
            <input type="radio" id=Gender name=Female value="Female"> Female

            <label for="DOB"> Date of Birth:</label>
            <input type="date" id=DOB name=DOB>
            <br><br>

            <label for="file"> Data File Upload:</label>
            <input type="file" id=file name= file>
            <br> <br>

            <label for="address"> Address: </label>
            <textarea id= Address cols="10" rows="10"></textarea>
            <br><br>

            <label for="password"> Password: </label>
            <input type="password" id=pass name=pass>

            
    </body>
</html>
